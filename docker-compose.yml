services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: financeai-db
    environment:
      POSTGRES_USER: financeai
      POSTGRES_PASSWORD: financeai_dev
      POSTGRES_DB: financeai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      
volumes:
  postgres_data: