name: Trigger auto deployment for financeai-backend

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/financeai-backend-AutoDeployTrigger-dc94f2cf-ba6c-4710-b085-e6192a10c74d.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{secrets.AZURE_CREDENTIALS}}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}"apps/backend/Dockerfile"
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: financeaiacr.azurecr.io
          registryUsername: ${{ secrets.FINANCEAIBACKEND_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.FINANCEAIBACKEND_REGISTRY_PASSWORD }}
          containerAppName: financeai-backend
          resourceGroup: financeai-rg
          imageToBuild: financeaiacr.azurecr.io/financeai-backend:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


